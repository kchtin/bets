server {
    listen 80;
    listen [::]:80;
    server_name cldan.duckdns.org;

    root /opt/sixhe/react-ts/dist;
    index index.html;

    # 支持前端路由的 SPA 回退
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 静态资源长期缓存
    location ~* \.(?:css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
