<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>sixhe</title>
  </head>
  <body>
    <div id="app">
      <header class="app-header">
        <h1>sixhe 注单工具</h1>
      </header>
      <main class="app-main">
        <section class="left-panel">
          <div class="input-group">
            <button id="btn-paste" type="button">粘贴</button>
            <textarea id="input-raw" rows="4" placeholder="粘贴或输入下注文案，如：鼠牛虎兔*5"></textarea>
          </div>
          <div class="result-box">
            <label for="output-parse">解析结果</label>
            <textarea id="output-parse" class="copyable" rows="6" readonly placeholder="10*10,20*10,30*10" title="点击复制"></textarea>
          </div>
          <div class="result-box">
            <label for="output-split">拆单结果</label>
            <textarea id="output-split" class="copyable" rows="6" readonly title="点击复制"></textarea>
          </div>
        </section>
        <aside class="right-panel">
          <h2>设置</h2>
          <div class="setting-item">
            <label for="setting-groups">组数</label>
            <input id="setting-groups" type="number" min="1" value="5" />
          </div>
          <div class="setting-item">
            <label for="setting-min">最低金额</label>
            <input id="setting-min" type="number" min="0" value="10" />
          </div>
          <div class="setting-item">
            <label>倍数</label>
            <div class="multiplier-btns">
              <button id="btn-mul5" type="button">5x</button>
              <button id="btn-mul10" type="button">10x</button>
            </div>
          </div>
          <div class="setting-actions">
            <button id="btn-split" type="button">拆单</button>
          </div>
          <div id="status-log" class="status-log"></div>
        </aside>
      </main>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
